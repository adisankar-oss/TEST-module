version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: interview_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interview_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: interview_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: interview_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"